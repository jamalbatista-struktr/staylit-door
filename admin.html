<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Stay Lit · Flyer Manager</title>
<style>
  :root{--fire:linear-gradient(90deg,#E11D1D,#FF6A00 55%,#FFC400)}
  *{box-sizing:border-box}
  body{margin:0;background:#000;color:#F2EDE6;font-family:-apple-system,Segoe UI,Inter,sans-serif}
  .head{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid #1c1c1c}
  .head img{height:34px} .head b{font-size:15px;letter-spacing:.04em}
  .wrap{max-width:680px;margin:0 auto;padding:18px}
  .gate{padding:48px 22px;text-align:center}
  .gate h1{font-size:24px;margin:0 0 6px}.gate p{color:#9a938a;font-size:14px;margin:0 0 20px}
  input[type=password]{width:100%;max-width:280px;padding:14px;border-radius:12px;border:1px solid #2a2a2a;background:#0d0d0d;color:#fff;font-size:16px;text-align:center}
  .btn{border:none;border-radius:999px;padding:13px 22px;font-weight:800;font-size:15px;cursor:pointer;background:var(--fire);color:#1a0f06;margin-top:14px}
  .err{color:#ff8a8a;font-size:13px;min-height:18px;margin-top:10px}
  .card{display:flex;gap:14px;align-items:center;background:#0d0d0d;border:1px solid #262626;border-radius:14px;padding:14px;margin-bottom:14px}
  .thumb{width:96px;height:120px;border-radius:10px;object-fit:cover;background:linear-gradient(135deg,#3a1024,#0a0a0a);flex:none;display:flex;align-items:center;justify-content:center;color:#7a6f64;font-size:11px;text-align:center}
  .meta{flex:1;min-width:0}
  .meta h3{margin:0 0 2px;font-size:18px} .meta .c{color:#9a938a;font:400 12px ui-monospace,monospace;margin-bottom:10px}
  .file{display:block;font-size:13px;color:#cfc6ba}
  .file::file-selector-button{border:none;border-radius:999px;padding:9px 14px;font-weight:800;font-size:13px;cursor:pointer;background:var(--fire);color:#1a0f06;margin-right:10px}
  .status{font-size:12px;margin-top:8px;min-height:16px}
  .status.ok{color:#48d178}.status.bad{color:#ff8a8a}.status.up{color:#FFC400}
  .hint{color:#7a6f64;font-size:12px;text-align:center;margin-top:18px}
</style></head><body>
<div class="head"><img src="https://vftfzidbhivhyzyphmjf.supabase.co/storage/v1/object/public/app/logo.png" alt="Stay Lit"><b>FLYER MANAGER</b></div>

<div class="wrap">
  <div class="gate" id="gate">
    <h1>Admin Access</h1><p>Enter your admin code to manage event flyers.</p>
    <input id="code" type="password" inputmode="numeric" placeholder="Admin code" autocomplete="off">
    <div><button class="btn" onclick="enter()">Enter</button></div>
    <div class="err" id="err"></div>
  </div>
  <div id="list" style="display:none"></div>
  <div class="hint" id="hint" style="display:none">Pick an image for an event — it uploads and updates instantly, everywhere that event shows.</div>
</div>

<script>
const FB="https://vftfzidbhivhyzyphmjf.supabase.co/functions/v1";
const ANON="sb_publishable_1LItrh36ssH6c6_gKlqCUQ_4BG6FVwp";
let code="";
const $=id=>document.getElementById(id);

async function enter(){
  code=$("code").value.trim();
  if(!code){$("err").textContent="Enter the admin code.";return;}
  $("err").textContent="Loading events…";
  try{
    const res=await fetch(FB+"/list-events?client=stay-lit",{headers:{apikey:ANON,Authorization:"Bearer "+ANON}});
    const d=await res.json();
    const events=(d&&d.events)||[];
    if(!events.length){$("err").textContent="No events found.";return;}
    render(events);
    $("gate").style.display="none";$("list").style.display="block";$("hint").style.display="block";
  }catch(e){$("err").textContent="Couldn't load events: "+e.message;}
}

function render(events){
  const list=$("list"); list.innerHTML="";
  events.forEach(ev=>{
    const card=document.createElement("div"); card.className="card";
    const t=ev.flyer_url
      ? '<img class="thumb" id="thumb-'+ev.id+'" src="'+ev.flyer_url+'" alt="">'
      : '<div class="thumb" id="thumb-'+ev.id+'">No flyer yet</div>';
    card.innerHTML=t+
      '<div class="meta"><h3>'+(ev.name||"Event")+'</h3>'+
      '<div class="c">'+((ev.city||"")+(ev.region?", "+ev.region:""))+'</div>'+
      '<input class="file" type="file" accept="image/png,image/jpeg,image/webp" '+
        'onchange="upload(this,\''+ev.id+'\')">'+
      '<div class="status" id="st-'+ev.id+'"></div></div>';
    list.appendChild(card);
  });
}

async function upload(input,eventId){
  const file=input.files&&input.files[0]; if(!file)return;
  const st=$("st-"+eventId); st.className="status up"; st.textContent="Uploading…";
  try{
    const fd=new FormData(); fd.append("event_id",eventId); fd.append("file",file);
    const res=await fetch(FB+"/admin-set-flyer",{method:"POST",headers:{"x-admin-code":code},body:fd});
    if(res.status===401){st.className="status bad";st.textContent="Wrong admin code — reload and re-enter.";return;}
    const d=await res.json();
    if(!res.ok){st.className="status bad";st.textContent="Error: "+(d.error||res.status);return;}
    const url=d.flyer_url+"?t="+Date.now();
    let thumb=$("thumb-"+eventId);
    if(thumb.tagName!=="IMG"){const img=document.createElement("img");img.className="thumb";img.id=thumb.id;thumb.replaceWith(img);thumb=img;}
    thumb.src=url;
    st.className="status ok"; st.textContent="Saved ✓ — flyer updated everywhere.";
    input.value="";
  }catch(e){st.className="status bad";st.textContent="Upload failed: "+e.message;}
}
</script></body></html>
